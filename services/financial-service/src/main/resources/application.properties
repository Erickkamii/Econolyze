quarkus.http.port=8082

quarkus.live-reload.instrumentation=true

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME}
quarkus.datasource.password=${DB_PASSWORD}
quarkus.datasource.reactive.url=${DB_URL}

banco-central-api/mp-rest/url=${BANCO_CENTRAL_API_URL}
banco-central-api/mp-rest/scope=jakarta.enterprise.context.ApplicationScoped
banco-central-api/mp-rest/connectTimeout=5000
banco-central-api/mp-rest/readTimeout=10000

quarkus.http.http2=true


quarkus.scheduler.enabled=true
quarkus.scheduler.timezone=America/Sao_Paulo

# ou, se usa migrations, evite rodß-las nos testes quando nŃo precisar
# quarkus.flyway.enabled=false

# Habilita a autenticańŃo via JWT
quarkus.smallrye-jwt.enabled=true

mp.jwt.verify.issuer=econolyze

# Caminho pra chave p·blica usada pra verificar o token
mp.jwt.verify.publickey.location=keys/publicKey.pem
